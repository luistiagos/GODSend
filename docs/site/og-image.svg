<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="GODsend 360 — Xbox 360 game manager for Aurora">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(34,197,94,0.08)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowA" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconSheen" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7BE39C"/>
      <stop offset="55%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- GODsend logo: green orb with white V -->
  <g transform="translate(116,116)">
    <circle r="44" fill="url(#iconSheen)"/>
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <path d="M-24 -19 L0 21 L24 -19" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="180" y="135"
        font-family="'Russo One', 'Arial Black', sans-serif"
        font-size="40" fill="#E2E8F0" letter-spacing="2">GODsend
    <tspan fill="#22C55E"> 360</tspan>
  </text>

  <!-- Headline -->
  <text x="80" y="280"
        font-family="'Russo One', 'Arial Black', sans-serif"
        font-size="74" fill="#F8FAFC">The Xbox 360 game manager</text>
  <text x="80" y="360"
        font-family="'Russo One', 'Arial Black', sans-serif"
        font-size="74" fill="url(#sweep)">your Aurora dashboard deserves.</text>

  <!-- Subhead -->
  <text x="80" y="440"
        font-family="'Chakra Petch', 'Segoe UI', sans-serif"
        font-size="26" fill="#CBD5E1">
    ISO → GOD · DLC + Title Updates · save backup · BadAvatar USB · over FTP.
  </text>
  <text x="80" y="478"
        font-family="'Chakra Petch', 'Segoe UI', sans-serif"
        font-size="26" fill="#94A3B8">
    Free, open source. Windows · macOS · Linux. No account required.
  </text>

  <!-- Tag line -->
  <g transform="translate(80,540)">
    <rect width="220" height="44" rx="10" fill="#22C55E"/>
    <text x="110" y="30" text-anchor="middle"
          font-family="'Russo One', sans-serif" font-size="20" fill="#020617">DOWNLOAD FREE</text>
  </g>
  <text x="320" y="572"
        font-family="'JetBrains Mono', monospace" font-size="18" fill="#94A3B8">
    github.com/ghostyshell/GODSend-360
  </text>

  <!-- Console silhouette accent -->
  <g transform="translate(820,170)" opacity="0.85">
    <rect x="0" y="0" width="320" height="200" rx="12" fill="#0F172A" stroke="#A855F7" stroke-width="1.5"/>
    <rect x="14" y="14" width="292" height="14" rx="6" fill="#1E293B"/>
    <g transform="translate(20,40)">
      <rect width="80" height="100" rx="6" fill="#22C55E" opacity="0.25"/>
      <rect x="92" width="80" height="100" rx="6" fill="#A855F7" opacity="0.25"/>
      <rect x="184" width="80" height="100" rx="6" fill="#22D3EE" opacity="0.25"/>
    </g>
    <rect x="20" y="150" width="280" height="6" rx="3" fill="#1E293B"/>
    <rect x="20" y="150" width="180" height="6" rx="3" fill="#22C55E"/>
    <text x="20" y="180" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94A3B8">
      FTP · Hdd1 · 192.168.1.42 · 14.2 MB/s
    </text>
  </g>
</svg>
